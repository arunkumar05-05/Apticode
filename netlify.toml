# Netlify Deployment Configuration

[build]
  # Navigate to the client directory to build
  base = "client"
  
  # The build command defined in client/package.json
  command = "npm run build"
  
  # The output directory generated by Vite (relative to base)
  publish = "dist"

# Single Page Application (SPA) routing fallback rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
